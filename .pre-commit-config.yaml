repos:
  - repo: local
    hooks:
      - id: lint
        name: Lint (ruff)
        entry: ruff check .
        language: system
        pass_filenames: false
      - id: no-eval
        name: Ban eval()
        entry: bash -c 'grep -rn "\beval(" --include="*.py" . && echo "eval() is forbidden" && exit 1 || exit 0'
        language: system
        pass_filenames: false
      - id: tests
        name: Run tests (pytest)
        entry: pytest tests/
        language: system
        pass_filenames: false